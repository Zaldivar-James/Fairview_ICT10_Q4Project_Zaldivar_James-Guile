<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Python Modules and Packages</title>
    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>
    <style>
        .topnav {
            background-color: #333;
            overflow: hidden;
        }

        .topnav a {
        float: left;
        color: #f2f2f2;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
        font-size: 17px;
        }

        .topnav a:hover {
        background-color: #ddd;
        color: black;
        }

        .topnav a.active {
        background-color: #04AA6D;
        color: white;
        }

        body {
            background-color: #141519;
            color: white;
            text-align: center;
            padding: 20px;
            font-family: "Avant Garde", Avantgarde, "Century Gothic", CenturyGothic, AppleGothic, sans-serif;
        }
        .container{
            background: linear-gradient(rgba(0, 0, 0, .5), rgba(0, 0, 0, .5));
            border: 1px solid gray;
            border-radius: 10px; ;
            background-size: cover;
            background-position: center;
            padding: 10px;
        }
        input[type="text"] {
            padding: 5px;
            margin: 10px 0;
            border: 1px solid gray;
            border-radius: 5px;
            width: 300px;
            font-size: 20px;
            background-color:#141519;
            color: white;
        }

        h1{
            font-size: 40px;
        }
        #bg-video {
             position: fixed;
             top: 0; left: 0;
             width: 100%; height: 100%;
             object-fit: cover;
             z-index: -1;
             filter: brightness(0.3); 
        }

        .btn{
            width: 1000px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="topnav">
        <a class="active" href="index.html">Classmate List</a>
        <a href="page2.html">Attendcance Checker</a>
        <a href="page3.html">Highlights</a>
    </div>
    <div class="container">
        <h2>Attendance Tracker</h2>

        <form onsubmit="return false;">
            <label>Select Day</label><br>
            <select id="day">
                <option value="Mon">Monday</option>
                <option value="Tue">Tuesday</option>
                <option value="Wed">Wednesday</option>
                <option value="Thu">Thursday</option>
                <option value="Fri">Friday</option>
            </select><br><br>

            <label>Absences</label><br>
            <input type="number" id="absences" min="0" placeholder="0"><br><br>

            <div class="button-group">
                <input type="button" py-click="show_graph" value="Show Graph">
            </div>
        </form><br>

        <div id="output"></div>
    </div>

    <py-script src="main.py"></py-script>
</body>
