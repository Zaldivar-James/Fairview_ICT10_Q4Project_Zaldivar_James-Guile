<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.1.1/core.js"></script>
    <title>Grade 10 Classmate System</title>
    <style>
        .topnav {
            background-color: #333;
            overflow: hidden;
        }

        .topnav a {
        float: left;
        color: #f2f2f2;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
        font-size: 17px;
        }

        .topnav a:hover {
        background-color: #ddd;
        color: black;
        }

        .topnav a.active {
        background-color: #04AA6D;
        color: white;
        }

        body {
            background-color: #141519;
            color: white;
            text-align: center;
            padding: 20px;
            font-family: "Avant Garde", Avantgarde, "Century Gothic", CenturyGothic, AppleGothic, sans-serif;
        }
        .container{
            background: linear-gradient(rgba(0, 0, 0, .5), rgba(0, 0, 0, .5));
            border: 1px solid gray;
            border-radius: 10px; ;
            background-size: cover;
            background-position: center;
            padding: 10px;
        }
        input[type="text"] {
            padding: 5px;
            margin: 10px 0;
            border: 1px solid gray;
            border-radius: 5px;
            width: 300px;
            font-size: 20px;
            background-color:#141519;
            color: white;
        }

        h1{
            font-size: 40px;
        }
        #bg-video {
             position: fixed;
             top: 0; left: 0;
             width: 100%; height: 100%;
             object-fit: cover;
             z-index: -1;
             filter: brightness(0.3); 
        }

        .btn{
            width: 1000px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="topnav">
        <a class="active" href="index.html">Classmate List</a>
        <a href="page2.html">Attendcance Checker</a>
        <a href="page3.html">Highlights</a>
    </div>
    <div class="container">
        <h1>List of Classmates</h1>
        <hr style="border: 1px solid gray; width: 80%; margin: 20px auto;">
        <form>
        <label for="name"">Name::</label><br>
        <input type="text" id="name" placeholder="Enter your name..." autocomplete="off"/><br>

        <label for="section">Section:</label><br>
        <input type="text" id="sect" placeholder="Enter your section..." autocomplete="off"/><br>

        <label for="subject">Favorite Subject:</label><br>
        <input type="text" id="subj" placeholder="Enter your subject..." autocomplete="off"/><br><br>

        <button class='btn btn-info' type="button" py-click="student_add">Add Student</button><br>
        <button class='btn btn-info' type="button" py-click="show_classlist">Show List</button><br>
        </form>
    </div>

    <br>

    <div class="container">
        <h1>Classmate List</h1>
        <div id="output1" align="center">
    </div>

    <script type="py" src="main.py"></script>
</body>
</html>
